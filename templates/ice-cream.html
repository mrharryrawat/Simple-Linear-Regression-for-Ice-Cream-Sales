<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ice Cream Revenue Predictor</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
            width:350px;
            text-align:center;
        }

        input{
            width:90%;
            padding:10px;
            margin:15px 0;
            font-size:16px;
        }

        button{
            padding:10px 20px;
            font-size:16px;
            cursor:pointer;
        }

        .result{
            margin-top:20px;
            color:green;
            font-size:20px;
            font-weight:bold;
        }

        .note{
            color:gray;
            font-size:12px;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Ice Cream Revenue Predictor</h2>

    <form action="/predict" method="POST">

        <input
            type="number"
            step="0.1"
            name="temperature"
            min="0"
            max="45"
            placeholder="Enter Temperature (°C)"
            required
        >

        <br>

        <button type="submit">
            Predict Revenue
        </button>

    </form>

    <div class="note">
        Temperature range: 0°C to 45°C
    </div>

    {% if prediction %}
    <div class="result">
        Temperature: {{ temperature }} °C
        <br><br>
        Predicted Revenue:
        <br>
        ₹ {{ prediction }}
    </div>
    {% endif %}

</div>

</body>
</html>
